<!doctype html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>כניסת מנהל</title>
  <style>
    body { font-family: Rubik, sans-serif; background:#f3f4f6; margin:0; display:grid; place-items:center; min-height:100vh; }
    .box { background:#fff; border:1px solid #e5e7eb; border-radius:12px; padding:24px; width:min(420px,92vw); }
    h1 { margin:0 0 12px; font-size:1.3rem; }
    input, button { width:100%; padding:10px; border-radius:10px; font-family:inherit; }
    input { border:1px solid #d1d5db; margin-bottom:10px; }
    button { border:0; background:#f28a14; color:#fff; font-weight:700; cursor:pointer; }
    .error { color:#b91c1c; font-size:0.9rem; min-height:18px; }
  </style>
</head>
<body>
  <form class="box" method="post" action="/admin/login">
    <h1>כניסת מנהל</h1>
    <div class="error" id="err"></div>
    <input type="password" name="password" placeholder="סיסמת מנהל" required />
    <button type="submit">התחבר</button>
  </form>
  <script>
    const params = new URLSearchParams(window.location.search);
    if (params.get('error') === '1') {
      document.getElementById('err').textContent = 'סיסמה שגויה';
    }
  </script>
</body>
</html>
