services:
  - type: web
    name: kosher-phone-shop
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn backend:app
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.3
      - key: ADMIN_PASSWORD
        sync: false
      - key: SECRET_KEY
        sync: false
